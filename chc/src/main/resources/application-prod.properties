## Database Configuration for Render (using PostgreSQL) ##
spring.datasource.url=${DATABASE_URL}
# spring.datasource.username=${DATABASE_USER}
# spring.datasource.password=${DATABASE_PASSWORD}

## JPA ##
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

## Custom Port No. (Render sets PORT env variable) ##
server.port=${PORT:8080}

## Actuator ##
management.endpoints.web.exposure.include=*

## JWT Configuration ##
jwt.secret=${JWT_SECRET:YourSuperSecretKeyThatIsAtLeast64BytesLongForHMACSHA512AlgorithmSecurityPurpose2026!}

## OpenAI API Key ##
spring.ai.openai.api-key=${OPENAI_API_KEY:dummy-key-for-prod}

## File Upload Limits ##
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
