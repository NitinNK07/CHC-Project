server:
  port: 8080
  error:
    include-message: always

spring:
  application:
    name: centralized-health-card-backend

  datasource:
    url: jdbc:h2:mem:health_card_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false;MODE=MySQL
    username: root
    password: root
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET:c2VjdXJlLWNlbnRyYWxpemVkLWhlYWx0aC1jYXJkLXN5c3RlbS1qd3Qtc2VjcmV0LWtleS1taW4tMjU2LWJpdHM=}
    access-token-expiration-ms: 86400000      # 24 hours
    refresh-token-expiration-ms: 604800000    # 7 days
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  notifications:
    sms:
      enabled: false   # plug Twilio/AWS SNS credentials and flip to true
    email:
      enabled: true
  file-storage:
    upload-dir: ./uploads/lab-reports
  frontend:
    base-url: ${FRONTEND_URL:http://localhost:5173}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    com.healthcard.backend: INFO
    org.springframework.security: WARN
